services:
  mongo:
    #image: mongo:7
    build:
      context: ./mongodb
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin_hp
      MONGO_INITDB_ROOT_PASSWORD: pass1234
      #MONGO_INITDB_DATABASE: hcare_db
    command: mongod --auth
    volumes:
      - type: bind
        source: ./databases
        target: /data/db
    networks:
      - app-network
  # Script python
  app:
    build: .
    container_name: migration_db
    depends_on:
      - mongo
    environment:
      - MONGO_URI_H=mongodb://admin_hp:pass1234@mongo:27017/
      - MONGO_URI_P=mongodb://admin_hp:pass1234@mongo:27017/
      - DB_NAME_H=hcare_db
      - DB_NAME_P=pcare_db
    volumes:
      - ./data:/appmdb/data
    networks:
      - app-network
networks:
  app-network:

 
